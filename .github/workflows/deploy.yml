name: Publish Image

on:
  push:
    branches: ["master"]
    paths-ignore:
      - ".gitignore"
      - "README.md"
      - ".vscode/**"
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/cache@v4
        id: cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm install

      - name: Build
        run: npm run build

      - name: Build and push Docker image
        run: |
          docker build . --file Dockerfile --tag ghcr.io/${{ github.repository_owner }}/0mainpage:latest
          docker push ghcr.io/${{ github.repository_owner }}/0mainpage:latest

      # - name: Trigger deploy via webhook
      #   run: |
      #     curl -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" -f --max-time 30 || echo "Webhook triggered (may be async)"
