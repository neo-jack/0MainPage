name: Publish Image
# 登陆github -> 安装环境 -> 缓存打包 -> 发布到镜像 -> ssh服务器拉取镜像部署

env:
  CONTAINER_NAME: 100my-page

on:
  push:
    branches: ["master"]
    paths-ignore:
      - ".gitignore"
      - "README.md"
      - ".vscode/**"
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/cache@v4
        id: cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm install

      - name: Build
        run: npm run build

      - name: Build and push Docker image
        run: |
          docker build . --file Dockerfile --tag ghcr.io/${{ github.repository_owner }}/my-page:latest
          docker push ghcr.io/${{ github.repository_owner }}/my-page:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: '22'
          timeout: 30s
          command_timeout: 10m
          script: |
            # 停掉并删除同名容器（正常部署路径）
            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true

            # 清掉占用 80 端口的其他容器（防止旧部署残留导致端口冲突）
            OCCUPIED=$(docker ps -q --filter "publish=80")
            if [ -n "$OCCUPIED" ]; then
              echo "Found containers occupying port 80: $OCCUPIED"
              docker stop $OCCUPIED || true
              docker rm $OCCUPIED || true
            fi

            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository_owner }}/my-page:latest
            docker run -d --restart=always --name ${{ env.CONTAINER_NAME }} \
              -p 80:80 \
              ghcr.io/${{ github.repository_owner }}/my-page:latest
